# =============================================================================
# Traefik – Configuración Dinámica (dynamic.yml)
# -----------------------------------------------------------------------------
# Este archivo contiene la configuración dinámica de Traefik, cargada a través
# del provider "file". Los cambios aquí son detectados automáticamente sin
# reiniciar Traefik.
# =============================================================================

# ---------------------------------------------------------------------------
# Routers y Servicios — A/B Testing y Round-Robin con WRR
# ---------------------------------------------------------------------------
# app-ab.edgardovasquez.cl: WRR con pesos 20/80 entre app-a y app-b
# app-lb.edgardovasquez.cl: WRR con pesos iguales entre app-x, app-y y app-z
http:
  routers:
    app-ab:
      entrypoints:
        - websecure
      rule: Host(`app-ab.edgardovasquez.cl`)
      tls:
        certResolver: letsencrypt
      service: app-ab-wrr

    app-lb:
      entrypoints:
        - websecure
      rule: Host(`app-lb.edgardovasquez.cl`)
      tls:
        certResolver: letsencrypt
      service: app-lb-rr

  services:
    app-ab-wrr:
      weighted:
        services:
          - name: app-a@docker
            weight: 20
          - name: app-b@docker
            weight: 80

    app-lb-rr:
      weighted:
        services:
          - name: app-x@docker
            weight: 1
          - name: app-y@docker
            weight: 1
          - name: app-z@docker
            weight: 1

# ---------------------------------------------------------------------------
# Opciones de TLS
# ---------------------------------------------------------------------------
tls:
  options:
    default:
      minVersion: VersionTLS12
      cipherSuites:
        - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305
        - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305
        - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
