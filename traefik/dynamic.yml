# =============================================================================
# Traefik – Configuración Dinámica (dynamic.yml)
# -----------------------------------------------------------------------------
# Este archivo contiene la configuración dinámica de Traefik, cargada a través
# del provider "file". Los cambios aquí son detectados automáticamente sin
# reiniciar Traefik.
# =============================================================================

# ---------------------------------------------------------------------------
# Routers y Servicios — A/B Testing con WRR
# ---------------------------------------------------------------------------
# Router + Weighted Round Robin para app-ab.edgardovasquez.cl
# Los backends app-a y app-b se exponen via Docker provider (app-a@docker).
http:
  routers:
    app-ab:
      entrypoints:
        - websecure
      rule: Host(`app-ab.edgardovasquez.cl`)
      tls:
        certResolver: letsencrypt
      service: app-ab-wrr

  services:
    app-ab-wrr:
      weighted:
        services:
          - name: app-a@docker
            weight: 20
          - name: app-b@docker
            weight: 80

# ---------------------------------------------------------------------------
# Opciones de TLS
# ---------------------------------------------------------------------------
tls:
  options:
    default:
      minVersion: VersionTLS12
      cipherSuites:
        - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305
        - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305
        - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
